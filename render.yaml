services:
  - type: web
    runtime: node
    name: loners-web
    plan: starter
    region: oregon
    buildCommand: npm install && npm run render:build
    preDeployCommand: npm run prisma:deploy
    startCommand: npm run render:start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: loners-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: loners-cache
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        value: https://loners-web.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://loners-realtime.onrender.com
      - key: NEXT_PUBLIC_STUN_URL
        value: stun:stun.l.google.com:19302
      - fromGroup: loners-shared-secrets
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: CAPTCHA_SECRET_KEY
        sync: false
      - key: MODERATION_IMAGE_ENDPOINT
        sync: false
      - key: MODERATION_TEXT_ENDPOINT
        sync: false
      - key: SUPPORT_EMAIL
        value: support@loners.example

  - type: web
    runtime: node
    name: loners-realtime
    plan: starter
    region: oregon
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run render:socket
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: loners-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: loners-cache
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        value: https://loners-web.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://loners-web.onrender.com
      - fromGroup: loners-shared-secrets

  - type: keyvalue
    name: loners-cache
    plan: starter
    region: oregon
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: loners-db
    databaseName: loners
    user: loners
    region: oregon
    plan: basic-256mb
    postgresMajorVersion: "16"

envVarGroups:
  - name: loners-shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_ACTION_SECRET
        generateValue: true
